{{- if .Values.cnpg.enabled -}}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "paperless.cnpg.clusterName" . }}
  labels:
    {{- include "paperless.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.cnpg.instances }}
  imageName: {{ .Values.cnpg.imageName | quote }}
  storage:
    size: {{ .Values.cnpg.storage.size }}
    {{- if .Values.cnpg.storage.storageClass }}
    storageClass: {{ .Values.cnpg.storage.storageClass | quote }}
    {{- end }}
  bootstrap:
    initdb:
      database: {{ .Values.cnpg.database | quote }}
      owner: {{ .Values.cnpg.owner | quote }}
      {{- if .Values.cnpg.bootstrapSecret }}
      secret:
        name: {{ .Values.cnpg.bootstrapSecret }}
      {{- end }}
  {{- with .Values.cnpg.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if .Values.cnpg.monitoring.enabled }}
  monitoring:
    enablePodMonitor: true
  {{- end }}
  {{- if .Values.cnpg.backup.enabled }}
  backup:
    retentionPolicy: {{ .Values.cnpg.backup.retentionPolicy | quote }}
    barmanObjectStore:
      {{- toYaml .Values.cnpg.backup.barmanObjectStore | nindent 6 }}
  {{- end }}
{{- end }}
