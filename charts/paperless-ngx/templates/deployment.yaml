apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paperless.fullname" . }}
  labels:
    {{- include "paperless.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "paperless.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "paperless.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "paperless.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if or .Values.cnpg.enabled .Values.externalDatabase.enabled .Values.redis.enabled .Values.externalRedis.enabled }}
      initContainers:
        {{- if or .Values.cnpg.enabled .Values.externalDatabase.enabled }}
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for database at $PAPERLESS_DBHOST:$PAPERLESS_DBPORT..."
              until nc -z "$PAPERLESS_DBHOST" "$PAPERLESS_DBPORT"; do sleep 2; done
              echo "Database reachable."
          envFrom:
            - configMapRef:
                name: {{ include "paperless.configMapName" . }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
        {{- end }}
        {{- if or .Values.redis.enabled .Values.externalRedis.enabled }}
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Parse host:port from PAPERLESS_REDIS, stripping scheme/credentials/path
              url="${PAPERLESS_REDIS#redis://}"
              url="${url#rediss://}"
              hostport="${url##*@}"
              hostport="${hostport%%/*}"
              host="${hostport%%:*}"
              port="${hostport##*:}"
              [ "$host" = "$port" ] && port=6379
              echo "Waiting for redis at $host:$port..."
              until nc -z "$host" "$port"; do sleep 2; done
              echo "Redis reachable."
          env:
            - name: PAPERLESS_REDIS
              {{- if and .Values.externalRedis.enabled .Values.externalRedis.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalRedis.existingSecret }}
                  key: {{ .Values.externalRedis.existingSecretKey }}
              {{- else }}
              value: {{ include "paperless.redisUrl" . | quote }}
              {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
        {{- end }}
      {{- end }}
      containers:
        - name: paperless
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "paperless.configMapName" . }}
          env:
            - name: USERMAP_UID
              value: {{ .Values.podSecurityContext.runAsUser | default 1000 | quote }}
            - name: USERMAP_GID
              value: {{ .Values.podSecurityContext.runAsGroup | default 1000 | quote }}
            {{- /* Redis URL */}}
            - name: PAPERLESS_REDIS
              {{- if and .Values.externalRedis.enabled .Values.externalRedis.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalRedis.existingSecret }}
                  key: {{ .Values.externalRedis.existingSecretKey }}
              {{- else }}
              value: {{ include "paperless.redisUrl" . | quote }}
              {{- end }}
            {{- /* DB credentials */}}
            {{- if .Values.cnpg.enabled }}
            - name: PAPERLESS_DBUSER
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless.cnpg.appSecretName" . }}
                  key: username
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless.cnpg.appSecretName" . }}
                  key: password
            {{- else if .Values.externalDatabase.enabled }}
            {{- if .Values.externalDatabase.existingSecret }}
            - name: PAPERLESS_DBUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.existingSecret }}
                  key: {{ .Values.externalDatabase.existingSecretUserKey }}
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.existingSecret }}
                  key: {{ .Values.externalDatabase.existingSecretPasswordKey }}
            {{- else }}
            - name: PAPERLESS_DBUSER
              value: {{ .Values.externalDatabase.user | quote }}
            - name: PAPERLESS_DBPASS
              value: {{ .Values.externalDatabase.password | quote }}
            {{- end }}
            {{- end }}
            {{- /* SECRET_KEY */}}
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretKey.existingSecret | default (include "paperless.secretName" .) }}
                  key: {{ .Values.secretKey.existingSecretKey | default "PAPERLESS_SECRET_KEY" }}
            {{- /* Admin bootstrap */}}
            {{- if .Values.admin.existingSecret }}
            - name: PAPERLESS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.existingSecret }}
                  key: {{ .Values.admin.existingSecretUserKey }}
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.existingSecret }}
                  key: {{ .Values.admin.existingSecretPasswordKey }}
            {{- else }}
            - name: PAPERLESS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless.secretName" . }}
                  key: PAPERLESS_ADMIN_USER
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless.secretName" . }}
                  key: PAPERLESS_ADMIN_PASSWORD
            {{- if .Values.admin.email }}
            - name: PAPERLESS_ADMIN_MAIL
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless.secretName" . }}
                  key: PAPERLESS_ADMIN_MAIL
            {{- end }}
            {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            {{- omit .Values.startupProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.data.enabled }}
            - name: data
              mountPath: /usr/src/paperless/data
            {{- end }}
            {{- if .Values.persistence.media.enabled }}
            - name: media
              mountPath: /usr/src/paperless/media
            {{- end }}
            {{- if .Values.persistence.consume.enabled }}
            - name: consume
              mountPath: /usr/src/paperless/consume
            {{- end }}
            {{- if .Values.persistence.export.enabled }}
            - name: export
              mountPath: /usr/src/paperless/export
            {{- end }}
      volumes:
        {{- range $name, $cfg := .Values.persistence }}
        {{- if $cfg.enabled }}
        - name: {{ $name }}
          persistentVolumeClaim:
            claimName: {{ $cfg.existingClaim | default (printf "%s-%s" (include "paperless.fullname" $) $name) }}
        {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
