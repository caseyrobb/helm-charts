{{- /*
Chart-managed secret. Holds:
  - PAPERLESS_SECRET_KEY (unless secretKey.existingSecret is set)
  - PAPERLESS_ADMIN_USER/PAPERLESS_ADMIN_PASSWORD/PAPERLESS_ADMIN_MAIL
    (unless admin.existingSecret is set)
The Deployment wires each key conditionally so this Secret is omitted when
all values are sourced from existing secrets.
*/ -}}
{{- $needSecretKey := and (not .Values.secretKey.existingSecret) (not .Values.secretKey.value) -}}
{{- $needAdmin := not .Values.admin.existingSecret -}}
{{- if or $needSecretKey .Values.secretKey.value $needAdmin -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "paperless.secretName" .) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperless.secretName" . }}
  labels:
    {{- include "paperless.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{- if .Values.secretKey.value }}
  PAPERLESS_SECRET_KEY: {{ .Values.secretKey.value | quote }}
  {{- else if not .Values.secretKey.existingSecret }}
  PAPERLESS_SECRET_KEY: {{ (index (default dict $existing.data) "PAPERLESS_SECRET_KEY") | default (randAlphaNum 50 | b64enc) | b64dec | quote }}
  {{- end }}
  {{- if $needAdmin }}
  PAPERLESS_ADMIN_USER: {{ .Values.admin.user | quote }}
  PAPERLESS_ADMIN_PASSWORD: {{ .Values.admin.password | default ((index (default dict $existing.data) "PAPERLESS_ADMIN_PASSWORD") | default (randAlphaNum 24 | b64enc) | b64dec) | quote }}
  {{- if .Values.admin.email }}
  PAPERLESS_ADMIN_MAIL: {{ .Values.admin.email | quote }}
  {{- end }}
  {{- end }}
{{- end }}
